name: Cursor Agent Review

# DISABLED on PR events — superseded by Stage 2 autofix (cursor-agent-autofix.yml).
# Keep for manual advisory review if needed.
on:
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript check
        id: tsc
        continue-on-error: true
        run: |
          set +e
          npx tsc -b --noEmit > tsc.log 2>&1
          code=$?
          echo "EXIT=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Unit tests
        id: vitest
        continue-on-error: true
        run: |
          set +e
          npx vitest run --reporter=verbose > vitest.log 2>&1
          code=$?
          echo "EXIT=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build check summary
        run: |
          {
            echo "=== Mechanical Check Results ==="
            echo ""
            echo "[TypeScript] Exit: ${{ steps.tsc.outputs.EXIT }}"
            tail -n 40 tsc.log 2>/dev/null || true
            echo ""
            echo "[Vitest] Exit: ${{ steps.vitest.outputs.EXIT }}"
            tail -n 60 vitest.log 2>/dev/null || true
          } > check-summary.txt

      - name: Install Cursor CLI
        run: |
          curl -fsSL https://cursor.com/install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          agent --version

      - name: Cursor Agent analyze and review
        id: agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"
          # Strip accidental whitespace/newlines from secret paste
          CURSOR_API_KEY="$(printf '%s' "${CURSOR_API_KEY}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          export CURSOR_API_KEY
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "CURSOR_API_KEY secret is missing" >&2
            exit 1
          fi
          PROMPT="$(cat .github/cursor-agent-review-prompt.md)"
          # Capture stdout as the report. No --force: agent must not edit the repo.
          agent -p --trust --output-format text "$PROMPT" > agent-report.md

      - name: Post review to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const ok = (code) => (String(code) === '0' ? 'OK' : 'FAIL');

            let report = '(Agent report generation failed, see Actions log)';
            try {
              const text = fs.readFileSync('agent-report.md', 'utf8').trim();
              if (text) report = text;
            } catch (_) {
              // keep fallback
            }

            const body = [
              '## Cursor Agent Review Report',
              '',
              '| Check | Result |',
              '|-------|--------|',
              `| TypeScript (tsc) | ${ok('${{ steps.tsc.outputs.EXIT }}')} |`,
              `| Vitest | ${ok('${{ steps.vitest.outputs.EXIT }}')} |`,
              '',
              '---',
              '',
              report,
              '',
              '---',
              '> Auto-generated by Cursor Agent CLI. Advisory only — human merge required.',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
